name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write   # D4: required for cosign OIDC keyless signing (active)

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/probationer070/d1-health-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=d1-health-api
          cache-to: type=gha,scope=d1-health-api,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
          provenance: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign OIDC keyless)
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ghcr.io/probationer070/d1-health-api
        run: |
          echo "Digest: $IMAGE_DIGEST"
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "ERROR: build step did not output a digest" && exit 1
          fi
          cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

      - name: Verify signature
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ghcr.io/probationer070/d1-health-api
          GITHUB_REF: ${{ github.ref }}
        run: |
          cosign verify \
            --certificate-identity \
              "https://github.com/probationer070/d1-container-fundamentals/.github/workflows/release.yaml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}@${IMAGE_DIGEST}"
