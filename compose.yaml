services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0-dev}
        GIT_SHA: ${GIT_SHA:-local}
    image: d1-health-api:slim
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
